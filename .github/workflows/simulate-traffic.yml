name: Simular tráfego Clarity

on:
  workflow_dispatch:
    inputs:
      sessions:
        description: Quantidade de sessões simuladas
        required: false
        default: '5'
        type: string
  schedule:
    # 9h e 21h horário de Brasília (UTC-3)
    - cron: '0 12,0 * * *'

permissions:
  contents: read

concurrency:
  group: simulate-traffic
  cancel-in-progress: false

jobs:
  simulate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Instalar dependências
        run: npm install

      - name: Instalar Chromium (Playwright)
        run: npx playwright install chromium --with-deps

      - name: Simular visitantes
        env:
          SITE_URL: https://laurielylourenco.github.io/humor-hoje
          SESSIONS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.sessions || '5' }}
        run: npm run simulate -- --url "$SITE_URL" --sessions "$SESSIONS"
